<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Lista de Produtos - SUIPA</title>
</head>
<body>
  <div class="lista-de-produtos-iphone-17" data-name="Lista de Produtos - iPhone 17">
    <div class="header-topappbar" data-name="Header - TopAppBar">
      <div class="container" data-name="Container">
        <div class="button menu-button" data-name="Button">
          <div class="image-svg" data-name="Container"></div>
        </div>
        <div class="heading-1" data-name="Heading 1">
          <span class="suipa" data-name="SUIPA">SUIPA</span>
        </div>
      </div>
      <div class="button cart-button" data-name="Button">
        <div class="image-svg" data-name="Container"></div>
      </div>
    </div>

    <main class="main-content" data-name="Main Content">
      <section class="filter-search-bar" data-name="Filter & Search Bar">
        <div class="container search-row" data-name="Container">
          <div class="input" data-name="Input">
            <span class="search-icon" data-name="Container"></span>
            <input type="text" placeholder="Buscar produtos para seu pet..." aria-label="Buscar produtos para seu pet" />
          </div>
          <div class="container" data-name="Container"></div>
        </div>

        <div class="horizontal-categories-filter" data-name="Horizontal Categories Filter">
          <div class="button pill selected" data-name="Button">Todos</div>
          <div class="button pill" data-name="Button">Cães</div>
          <div class="button pill" data-name="Button">Gatos</div>
          <div class="button pill" data-name="Button">Brinquedos</div>
          <div class="button pill" data-name="Button">Camas</div>
        </div>

        <div class="horizontal-border" data-name="HorizontalBorder">
          <div class="heading-2" data-name="Heading 2">
            <span>Para Você</span>
          </div>
          <div class="button filter-button" data-name="Button">
            <span>Filtrar</span>
          </div>
        </div>
      </section>

      <section class="section-product-list" data-name="Section - Product List (Mobile Optimized Grid)">
        <div class="product-card card-1" data-name="Product Card 1">
          <div class="background" data-name="Background"></div>
          <div class="container card-content" data-name="Container">
            <div class="product-image" data-name="Container"></div>
            <div class="product-info" data-name="Container">
              <div class="heading-3" data-name="Heading 3">Cama Ortopédica Lux</div>
              <div class="price">R$ 249,00</div>
              <button class="button add-cart" data-name="Button">+ Carrinho</button>
            </div>
          </div>
        </div>

        <div class="product-card card-2" data-name="Product Card 2">
          <div class="background" data-name="Background"></div>
          <div class="container card-content" data-name="Container">
            <div class="product-image" data-name="Container"></div>
            <div class="product-info" data-name="Container">
              <div class="heading-3" data-name="Heading 3">Comedouro Cerâmico Design</div>
              <div class="price">R$ 89,90</div>
              <button class="button add-cart" data-name="Button">+ Carrinho</button>
            </div>
          </div>
        </div>

        <div class="product-card card-3" data-name="Product Card 3">
          <div class="background" data-name="Background"></div>
          <div class="container card-content" data-name="Container">
            <div class="product-image" data-name="Container"></div>
            <div class="product-info" data-name="Container">
              <div class="heading-3" data-name="Heading 3">Brinquedo Smart Ball</div>
              <div class="price">R$ 159,00</div>
              <button class="button add-cart" data-name="Button">+ Carrinho</button>
            </div>
          </div>
        </div>

        <div class="product-card card-4" data-name="Product Card 4">
          <div class="background" data-name="Background"></div>
          <div class="container card-content" data-name="Container">
            <div class="product-image" data-name="Container"></div>
            <div class="product-info" data-name="Container">
              <div class="heading-3" data-name="Heading 3">Fonte de Água Tech</div>
              <div class="price">R$ 199,00</div>
              <button class="button add-cart" data-name="Button">+ Carrinho</button>
            </div>
          </div>
        </div>

        <div class="product-card card-5" data-name="Product Card 5">
          <div class="background" data-name="Background"></div>
          <div class="container card-content" data-name="Container">
            <div class="product-image" data-name="Container"></div>
            <div class="product-info" data-name="Container">
              <div class="heading-3" data-name="Heading 3">Brinquedo de Corda PawPlay</div>
              <div class="price">R$ 45,00</div>
              <button class="button add-cart" data-name="Button">+ Carrinho</button>
            </div>
          </div>
        </div>

        <div class="pagination" data-name="Pagination">
          <button class="page-button" aria-label="Página anterior">←</button>
          <div class="page-info" data-name="Text">PG: 1 / 5</div>
          <button class="page-button" aria-label="Próxima página">→</button>
        </div>
      </section>
    </main>

    <div class="bottom-nav-bar" data-name="BottomNavBar">
      <div class="link active" data-name="Link">
        <div class="image-svg" data-name="Container"></div>
        <div class="container" data-name="Container">
          <span>Início</span>
        </div>
      </div>
      <div class="link" data-name="Link">
        <div class="image-svg" data-name="Container"></div>
        <div class="container" data-name="Container">
          <span>Categorias</span>
        </div>
      </div>
      <div class="link" data-name="Link">
        <div class="image-svg" data-name="Container"></div>
        <div class="container" data-name="Container">
          <span>Pedidos</span>
        </div>
      </div>
      <div class="link" data-name="Link">
        <div class="image-svg" data-name="Container"></div>
        <div class="container" data-name="Container">
          <span>Perfil</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
